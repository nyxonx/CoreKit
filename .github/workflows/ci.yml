name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CoreKit.sln

      - name: Build
        run: dotnet build CoreKit.sln --configuration Release --no-restore -m:1

      - name: Test
        run: dotnet test CoreKit.sln --configuration Release --no-build -m:1

      - name: Verify formatting
        run: pwsh ./build/format-check.ps1 -NoRestore
